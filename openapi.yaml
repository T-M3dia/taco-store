openapi: 3.0.3
info:
  title: Taco Store API
  description: API para la tienda de tacos en línea 🌮
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Servidor local

tags:
  - name: Tacos
    description: Gestión del menú de tacos
  - name: Orders
    description: Gestión de pedidos

paths:
  /tacos:
    get:
      tags: [Tacos]
      summary: Obtener todos los tacos del menú
      responses:
        "200":
          description: Lista de tacos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Taco"
    post:
      tags: [Tacos]
      summary: Agregar un nuevo taco al menú
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TacoInput"
      responses:
        "201":
          description: Taco creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Taco"

  /tacos/{id}:
    get:
      tags: [Tacos]
      summary: Obtener un taco por ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Taco encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Taco"
        "404":
          description: Taco no encontrado
    put:
      tags: [Tacos]
      summary: Actualizar un taco
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TacoInput"
      responses:
        "200":
          description: Taco actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Taco"
        "404":
          description: Taco no encontrado
    delete:
      tags: [Tacos]
      summary: Eliminar un taco del menú
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Taco eliminado exitosamente
        "404":
          description: Taco no encontrado

  /orders:
    get:
      tags: [Orders]
      summary: Obtener todos los pedidos
      responses:
        "200":
          description: Lista de pedidos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      tags: [Orders]
      summary: Crear un nuevo pedido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Pedido creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Obtener un pedido por ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Pedido no encontrado
    put:
      tags: [Orders]
      summary: Actualizar el estado de un pedido
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/OrderStatus"
      responses:
        "200":
          description: Pedido actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Pedido no encontrado
    delete:
      tags: [Orders]
      summary: Eliminar un pedido
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Pedido eliminado exitosamente
        "404":
          description: Pedido no encontrado

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    Taco:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        available:
          type: boolean

    TacoInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        available:
          type: boolean

    OrderStatus:
      type: string
      enum: [pending, preparing, ready, delivered, cancelled]

    OrderItem:
      type: object
      properties:
        tacoId:
          type: string
        quantity:
          type: integer

    Order:
      type: object
      properties:
        id:
          type: string
        customerName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
        status:
          $ref: "#/components/schemas/OrderStatus"
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [customerName, items]
      properties:
        customerName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
